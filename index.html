            { id: 'st26', category: 'Vật tư STEAM', name: 'Loa mini + Miếng bìa + Dây', unit: 'Bộ', price: 130000 },
            { id: 'st27', category: 'Vật tư STEAM', name: 'Đĩa CD', unit: 'Cái', price: 8000 }
        ];

        const formatCurrency = (amount) => new Intl.NumberFormat('vi-VN').format(amount) + ' ₫';

        const InputField = ({ label, value, onChange, type = "text" }) => (
            <div className="mb-3">

            </div>
        );

        function App() {
            const [isAuthenticated, setIsAuthenticated] = React.useState(false);
            const [password, setPassword] = React.useState('');
            
            const [quoteMode, setQuoteMode] = React.useState('package'); 
            const [customerName, setCustomerName] = React.useState('Trường Mầm Non Hướng Dương');
            const [quoterName, setQuoterName] = React.useState('Nguyễn Tường Vân');
            const [quoteDate, setQuoteDate] = React.useState(new Date().toISOString().split('T')[0]);
            
            const [selectedPackage, setSelectedPackage] = React.useState('bidding');
            
            const [searchQuery, setSearchQuery] = React.useState('');
            const [filterCategory, setFilterCategory] = React.useState('All');
            const [cart, setCart] = React.useState([]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (password === 'sunbot2026') setIsAuthenticated(true);
                else alert('Sai mật khẩu!');
            };

            const handleNativePrint = () => {
                const originalTitle = document.title;
                const fileName = quoteMode === 'package' ? selectedPackage : 'Ban_Le_Vat_Tu';
                document.title = `Bao_Gia_Sunbot_${fileName}_${quoteDate}`;
                window.print();
                setTimeout(() => { document.title = originalTitle; }, 1000);

            const addToCart = (item) => {
                setCart(prev => {
                    const existing = prev.find(i => i.item.id === item.id);
                    if (existing) return prev.map(i => i.item.id === item.id ? { ...i, qty: i.qty + 1 } : i);
                    return [...prev, { item, qty: 1, note: '' }];
                });
            };

            const updateCartQty = (id, newQty) => {
                if (newQty < 1) return;
                setCart(prev => prev.map(i => i.item.id === id ? { ...i, qty: newQty } : i));
            };
            
            const updateCartNote = (id, note) => {
                setCart(prev => prev.map(i => i.item.id === id ? { ...i, note } : i));
            };

            const removeFromCart = (id) => {
                setCart(prev => prev.filter(i => i.item.id !== id));
            };

            const retailCategories = ['All', ...new Set(retailInventory.map(i => i.category))];
            const filteredInventory = retailInventory.filter(i => 
                (filterCategory === 'All' || i.category === filterCategory) &&
                i.name.toLowerCase().includes(searchQuery.toLowerCase())
            );

            const retailTotal = cart.reduce((sum, cartItem) => sum + (cartItem.item.price * cartItem.qty), 0);

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-50 p-4">
                        <div className="bg-white p-8 rounded-xl shadow-xl w-full max-w-md border-t-4 border-sunbot-500 text-center">
                            <i className="fa-solid fa-robot text-sunbot-600 text-5xl mb-4"></i>

                            <form onSubmit={handleLogin}>
                                <input type="password" placeholder="Nhập mật khẩu..." className="w-full px-4 py-2 border rounded-lg mb-4 focus:ring-2 focus:ring-sunbot-500 outline-none" value={password} onChange={e => setPassword(e.target.value)} />
                                <button className="w-full bg-sunbot-600 text-white font-bold py-2 rounded-lg hover:bg-sunbot-700 transition">Đăng Nhập</button>
                            </form>
                        </div>
                    </div>
                );
            }

            const currentPkg = packagesData[selectedPackage];
            const dateObj = new Date(quoteDate);
            const dateStr = `Ngày ${dateObj.getDate().toString().padStart(2, '0')} tháng ${((dateObj.getMonth() + 1).toString().padStart(2, '0'))} năm ${dateObj.getFullYear()}`;

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    
                    {/* BẢNG ĐIỀU KHIỂN BÊN TRÁI (ẨN KHI IN) */}
                    <div className="w-full md:w-[380px] bg-white border-r border-gray-200 shadow-xl z-10 flex flex-col no-print h-screen sticky top-0">
                        
                        <div className="flex bg-gray-100 p-1.5 border-b border-gray-200">
                            <button onClick={() => setQuoteMode('package')} className={`flex-1 py-2 text-[12px] font-bold rounded-md transition-all ${quoteMode === 'package' ? 'bg-white text-sunbot-700 shadow-sm border border-gray-200' : 'text-gray-500 hover:text-gray-700'}`}>
                                BÁO GIÁ DỰ ÁN
                            </button>
                            <button onClick={() => setQuoteMode('retail')} className={`flex-1 py-2 text-[12px] font-bold rounded-md transition-all ${quoteMode === 'retail' ? 'bg-white text-sunbot-700 shadow-sm border border-gray-200' : 'text-gray-500 hover:text-gray-700'}`}>
                                BÁN LẺ / SỬA CHỮA
                            </button>
                        </div>

                        <div className="p-5 overflow-y-auto flex-1 flex flex-col">
                            <h2 className="font-bold text-[13px] text-gray-800 border-b border-gray-200 pb-1.5 mb-3 uppercase">Thông tin chung</h2>
                            <InputField label="Tên Khách Hàng / Đối Tác" value={customerName} onChange={setCustomerName} />
                            <InputField label="Chuyên viên Phụ trách" value={quoterName} onChange={setQuoterName} />
                            <InputField label="Ngày Báo Giá" type="date" value={quoteDate} onChange={setQuoteDate} />

                            {/* CHẾ ĐỘ PACKAGE */}
                            {quoteMode === 'package' && (
                                <div className="mt-2">
                                    <label className="block text-[13px] font-semibold text-gray-700 mb-2 uppercase">Cấu hình hệ thống</label>
                                    <div className="space-y-2">
                                        {Object.keys(packagesData).map((key) => (
                                            <label key={key} className={`flex items-center p-2.5 border rounded cursor-pointer transition-all ${selectedPackage === key ? 'border-sunbot-500 bg-sunbot-50 text-sunbot-700 font-bold shadow-sm' : 'hover:bg-gray-50 text-gray-600'}`}>
                                                <input type="radio" name="package" value={key} checked={selectedPackage === key} onChange={() => setSelectedPackage(key)} className="mr-3 w-4 h-4 text-sunbot-600" />
                                                <span className="text-[13px]">{packagesData[key].name}</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>

                            {/* CHẾ ĐỘ RETAIL CART */}

                                <div className="mt-2 flex flex-col flex-1 h-full">
                                    <label className="block text-[13px] font-semibold text-gray-700 mb-2 uppercase flex items-center justify-between border-b border-gray-200 pb-1">
                                        <span>Kho vật tư</span>
                                        <span className="text-[10px] font-normal text-gray-500 normal-case bg-gray-100 px-1.5 py-0.5 rounded">{retailInventory.length} sản phẩm</span>
                                    </label>
                                    <div className="flex space-x-2 mb-2">
                                        <select className="border border-gray-300 rounded px-2 py-1.5 text-[12px] w-[45%] focus:outline-none focus:border-sunbot-500 bg-white" value={filterCategory} onChange={e => setFilterCategory(e.target.value)}>
                                            {retailCategories.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                        </select>
                                        <input type="text" placeholder="Gõ tên tìm kiếm..." className="border border-gray-300 rounded px-2 py-1.5 text-[12px] flex-1 focus:outline-none focus:border-sunbot-500" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                    </div>
                                    
                                    <div className="border border-gray-200 rounded-md bg-gray-50 h-48 overflow-y-auto p-1 mb-4 shadow-inner">
                                        {filteredInventory.length === 0 && <p className="text-center text-[11px] text-gray-400 mt-16">Không tìm thấy vật tư.</p>}
                                        {filteredInventory.map(item => (
                                            <div key={item.id} className="flex justify-between items-center p-2 hover:bg-white rounded border-b border-transparent hover:border-gray-200 group transition-all">
                                                <div className="flex-1 min-w-0 pr-2">
                                                    <p className="text-[11.5px] font-bold text-gray-700 truncate group-hover:text-sunbot-700">{item.name}</p>
                                                    <p className="text-[10.5px] text-gray-500">{formatCurrency(item.price)} / {item.unit}</p>
                                                </div>
                                                <button onClick={() => addToCart(item)} className="bg-white border border-gray-300 text-gray-600 hover:bg-sunbot-500 hover:text-white hover:border-sunbot-500 w-6 h-6 flex items-center justify-center rounded transition-colors">
                                                    <i className="fa-solid fa-plus text-[10px]"></i>
                                                </button>
                                            </div>
                                        ))}
                                    </div>

                                    <label className="block text-[13px] font-semibold text-gray-700 mb-2 uppercase border-b border-gray-200 pb-1 flex justify-between">
                                        <span>Giỏ hàng báo giá</span>

                                    <div className="flex-1 overflow-y-auto mb-2 space-y-2 min-h-[150px]">
                                        {cart.length === 0 ? (

                                                <i className="fa-solid fa-cart-arrow-down text-2xl mb-2 opacity-30"></i>

                                                        </button>

                                                            <button onClick={() => updateCartQty(c.item.id, c.qty + 1)} className="px-2 py-0.5 text-gray-500 hover:text-black">+</button>
                                                        </div>
                                                        <span className="text-[10.5px] text-gray-500 italic">x {formatCurrency(c.item.price)}</span>
                                                        <span className="text-[12px] font-bold text-sunbot-700 ml-auto">{formatCurrency(c.item.price * c.qty)}</span>
                                                    </div>
                                                    <input type="text" placeholder="Ghi chú thêm (Tùy chọn)..." value={c.note} onChange={(e) => updateCartNote(c.item.id, e.target.value)} className="w-full mt-2 border-b border-dashed border-gray-300 text-[10.5px] italic focus:outline-none focus:border-sunbot-400 px-1 py-0.5 bg-transparent text-gray-600" />
                                                </div>
                                            ))
                                        }
                                    </div>
                                    {cart.length > 0 && (
                                        <div className="mt-2 pt-2 border-t border-gray-200 flex justify-between items-center bg-sunbot-50 p-2 rounded">
                                            <span className="text-[12px] font-bold text-gray-700">TỔNG CỘNG:</span>
                                            <span className="text-[14px] font-extrabold text-sunbot-700">{formatCurrency(retailTotal)}</span>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        <div className="p-5 border-t border-gray-200 bg-gray-50 mt-auto">
                            <button 
                                onClick={handleNativePrint} 
                                className="w-full flex items-center justify-center space-x-2 bg-sunbot-600 text-white font-bold py-3.5 rounded-lg shadow-md hover:bg-sunbot-700 hover:shadow-lg transition-all"
                            >
                                <i className="fa-solid fa-print"></i>
                                <span className="text-[14px]">In Báo Giá A4 / Xuất PDF</span>
                            </button>
                        </div>
                    </div>

                    {/* VÙNG KHUNG A4 XEM TRƯỚC */}
                    <div className="preview-wrapper flex-1">
                        <div className="a4-container">
                            <div id="quote-document">
                                
                                {/* HEADER CHUNG */}
                                <div className="flex justify-between items-start mb-6 border-b-[2px] border-sunbot-600 pb-3">
                                    <div>
                                        <h3 className="font-bold text-[14px] text-sunbot-700 uppercase tracking-wide">Công ty Cổ Phần Công Nghệ Giáo Dục Kiro VN</h3>
                                        <div className="text-[11px] text-gray-600 mt-1.5 space-y-0.5 font-medium">
                                            <p><span className="text-gray-800">Trụ sở:</span> Số 4 Lý Thường Kiệt, Cửa Nam, Hoàn Kiếm, Hà Nội</p>
                                            <p><span className="text-gray-800">VPĐD:</span> Tầng 11 tháp A, tòa The Light, Tố Hữu, Hà Nội</p>
                                            <p><span className="text-gray-800">Điện thoại:</span> 0866 109 086  |  <span className="text-gray-800">Web:</span> sunbot.vn</p>
                                        </div>
                                    </div>
                                    <div className="text-right flex flex-col items-end">
                                        <div className="flex items-center space-x-1.5 bg-sunbot-50 px-2.5 py-1 rounded border border-sunbot-100 mb-1.5">
                                            <i className="fa-solid fa-robot text-sunbot-600 text-lg"></i>
                                            <span className="font-extrabold text-[16px] text-sunbot-600 tracking-wider">SUNBOT</span>
                                        </div>
                                        <p className="text-[11px] italic text-gray-500">{dateStr}</p>
                                    </div>
                                </div>

                                {/* TIÊU ĐỀ */}
                                <div className="text-center mb-6 px-4">
                                    <h1 className="text-[16px] font-bold uppercase text-gray-900 whitespace-pre-line leading-relaxed">
                                        {quoteMode === 'package' ? currentPkg.title : "BẢNG BÁO GIÁ HỌC CỤ, VẬT TƯ\nVÀ DỊCH VỤ SỬA CHỮA SUNBOT"}
                                    </h1>
                                    <div className="w-12 h-1 bg-sunbot-500 mx-auto mt-3 rounded-full"></div>
                                </div>

                                {/* LỜI MỞ ĐẦU */}
                                <div className="mb-5 text-justify text-[12px] text-gray-800 leading-[1.6]">
                                    <p className="mb-1.5"><strong>Kính gửi: </strong> <span className="font-bold text-sunbot-700 uppercase">{customerName}</span></p>
                                    <p>
                                        {quoteMode === 'package' 
                                            ? `Chúng tôi xin trân trọng gửi tới Quý Đơn vị bảng báo giá chi tiết cấu hình ${currentPkg.name} thuộc chương trình Lập trình tư duy và STEAM cùng Sunbot. Lộ trình đầu tư được phân bổ rõ ràng nhằm giúp nhà trường tối ưu dòng tiền, vận hành hiệu quả và bền vững.`
                                            : "Chúng tôi xin trân trọng gửi tới Quý Đơn vị bảng báo giá chi tiết danh mục cung cấp học cụ lẻ, vật tư tiêu hao STEAM và dịch vụ bảo hành/sửa chữa theo yêu cầu như sau:"
                                        }
                                    </p>
                                </div>

                                {/* BẢNG GIÁ */}
                                <table className="table-lock mb-6 text-[12px]">
                                    <thead>
                                        <tr className="bg-sunbot-600 text-white border-y-2 border-sunbot-800">

                                            <th className="p-2 text-right border-x border-sunbot-700 font-bold" style={{ width: '18%' }}>Thành tiền (₫)</th>
                                            <th className="p-2 text-center border-x border-sunbot-700 font-bold text-[11px]" style={{ width: '18%' }}>Ghi chú</th>
                                        </tr>
                                    </thead>
                                    
                                    <tbody className="text-gray-800 border-b border-gray-300">
                                        
                                        {/* 1. RENDER CHẾ ĐỘ PACKAGE */}
                                        {quoteMode === 'package' && currentPkg.isPhased && (
                                            <>
                                                <tr className="bg-sunbot-100 text-sunbot-800 font-bold avoid-break border-b border-sunbot-200">
                                                    <td colSpan="5" className="p-2 text-left uppercase border-x border-gray-300">{currentPkg.phase1Name}</td>
                                                    <td className="p-2 text-right text-[13px] border-x border-gray-300">{formatCurrency(currentPkg.phase1Total)}</td>

                                                </tr>
                                                {currentPkg.phase1Items.map((item, idx) => (
                                                    <tr key={`p1-${idx}`} className="avoid-break border-b border-gray-200 hover:bg-gray-50">
                                                        <td className="p-2.5 text-center font-medium border-x border-gray-200 text-[11px]">{item.stt}</td>
                                                        <td className="p-2.5 leading-snug border-x border-gray-200 font-medium text-gray-700">{item.name}</td>
                                                        <td className="p-2.5 text-center text-gray-500 border-x border-gray-200">{item.unit}</td>
                                                        <td className="p-2.5 text-center border-x border-gray-200">{item.qty}</td>
                                                        <td className="p-2.5 text-right font-mono text-gray-600 border-x border-gray-200">{new Intl.NumberFormat('vi-VN').format(item.price)}</td>
                                                        <td className="p-2.5 text-right font-mono font-semibold text-gray-800 border-x border-gray-200">{new Intl.NumberFormat('vi-VN').format(item.total)}</td>
                                                        <td className="p-2 text-center text-[10.5px] text-gray-500 italic leading-tight border-x border-gray-200">{item.note}</td>
                                                    </tr>

                                                    <td colSpan="5" className="p-2 text-left uppercase border-x border-gray-300">{currentPkg.phase2Name}</td>
                                                    <td className="p-2 text-right text-[13px] border-x border-gray-300">{formatCurrency(currentPkg.phase2Total)}</td>
                                                    <td className="p-2 text-center text-[10.5px] font-normal italic border-x border-gray-300 text-gray-500">Kế hoạch tài chính</td>
                                                </tr>
                                                {currentPkg.phase2Items.map((item, idx) => (
                                                    <tr key={`p2-${idx}`} className="avoid-break border-b border-gray-200 hover:bg-gray-50">
                                                        <td className="p-2.5 text-center font-medium border-x border-gray-200 text-[11px] text-gray-500">{item.stt}</td>

                                                        <td className="p-2.5 text-center text-gray-400 border-x border-gray-200">{item.unit}</td>
                                                        <td className="p-2.5 text-center border-x border-gray-200 text-gray-500">{item.qty}</td>
                                                        <td className="p-2.5 text-right font-mono text-gray-400 border-x border-gray-200">{new Intl.NumberFormat('vi-VN').format(item.price)}</td>
                                                        <td className="p-2.5 text-right font-mono font-medium text-gray-600 border-x border-gray-200">{new Intl.NumberFormat('vi-VN').format(item.total)}</td>
                                                        <td className="p-2 text-center text-[10.5px] text-gray-400 italic leading-tight border-x border-gray-200">{item.note}</td>
                                                    </tr>
                                                ))}
                                            </>

                                        {/* RENDER CHẾ ĐỘ PACKAGE - THẦU */}
                                        {quoteMode === 'package' && !currentPkg.isPhased && currentPkg.items.map((item, idx) => {

                                        {quoteMode === 'retail' && cart.map((c, idx) => (
                                            <tr key={`cart-${idx}`} className="avoid-break border-b border-gray-200 hover:bg-gray-50">
                                                <td className="p-2.5 text-center font-medium border-x border-gray-200 text-[11px]">{idx + 1}</td>
                                                <td className="p-2.5 leading-snug border-x border-gray-200 font-medium text-gray-800">
                                                    {c.item.name} <br/><span className="text-[10px] text-gray-400 font-normal italic">Phân loại: {c.item.category}</span>
                                                </td>
                                                <td className="p-2.5 text-center text-gray-500 border-x border-gray-200">{c.item.unit}</td>
                                                <td className="p-2.5 text-center border-x border-gray-200 font-bold">{c.qty}</td>
                                                <td className="p-2.5 text-right font-mono text-gray-600 border-x border-gray-200">{new Intl.NumberFormat('vi-VN').format(c.item.price)}</td>
                                                <td className="p-2.5 text-right font-mono font-semibold text-gray-900 border-x border-gray-200">{new Intl.NumberFormat('vi-VN').format(c.item.price * c.qty)}</td>
                                                <td className="p-2 text-center text-[10.5px] text-gray-500 italic leading-tight border-x border-gray-200">{c.note}</td>
                                            </tr>
                                        ))}

                                        {/* TỔNG CỘNG CHUNG */}
                                        <tr className="bg-sunbot-50 font-extrabold text-gray-900 text-[13px] avoid-break border-y-2 border-sunbot-300">
                                            <td colSpan="5" className="p-3 text-right uppercase text-sunbot-800 border-x border-gray-300">
                                                {quoteMode === 'package' ? "Tổng Mức Đầu Tư Toàn Dự Án (3 Năm)" : "Tổng Giá Trị Thanh Toán (VNĐ)"}
                                            </td>
                                            <td colSpan="2" className="p-3 text-right text-sunbot-600 text-[15px] border-x border-gray-300 tracking-wide">
                                                {formatCurrency(quoteMode === 'package' ? currentPkg.total : retailTotal)}
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>

                                {/* ĐIỀU KHOẢN */}
                                <div className="mb-10 text-[11px] leading-relaxed text-gray-600 border border-gray-200 p-3.5 rounded bg-gray-50 avoid-break-block">
                                    <h4 className="font-bold text-gray-800 mb-1.5 uppercase text-[11px] flex items-center">
                                        <i className="fa-solid fa-shield-halved text-sunbot-600 mr-1.5"></i> Điều khoản & Chính sách
                                    </h4>
                                    <ul className="list-disc pl-5 space-y-1 text-justify">
                                        <li>Báo giá chưa bao gồm thuế VAT và chi phí vận chuyển ngoài khu vực quy định.</li>
                                        {quoteMode === 'retail' ? (
                                            <>
                                            <li><strong className="text-gray-700">Chính sách sửa chữa:</strong> Đối với linh kiện sửa chữa, robot sẽ được kỹ thuật viên tiếp nhận, kiểm tra lỗi và trả lại trong vòng 07-10 ngày làm việc.</li>
                                            <li><strong className="text-gray-700">Thanh toán:</strong> Thanh toán 100% giá trị đơn hàng trước khi giao hàng hoặc theo thỏa thuận hợp đồng đã ký kết.</li>
                                            </>
                                        ) : (
                                            <>
                                            <li>Chi phí lưu trú, di chuyển của chuyên gia đào tạo (nếu phát sinh ngoài hợp đồng) do nhà trường đài thọ.</li>
                                            <li><strong className="text-gray-700">Bảo hành:</strong> 1 đổi 1 hoặc sửa chữa theo tiêu chuẩn phần cứng; bảo trì liên tục hệ thống phần mềm.</li>
                                            </>
                                        )}
                                        <li>Báo giá có giá trị tham chiếu trong vòng <strong className="text-sunbot-600">30 ngày</strong> kể từ ngày phát hành.</li>
                                    </ul>
                                </div>

                                {/* CHỮ KÝ */}
                                <div className="flex justify-between mt-8 text-center pb-8 avoid-break-block">
                                    <div className="w-1/2">
                                        <p className="font-bold text-gray-900 mb-20 uppercase text-[12px]">Đại diện Khách Hàng</p>
                                        <p className="text-[11px] italic text-gray-500">(Ký và ghi rõ họ tên)</p>
                                    </div>
                                    <div className="w-1/2">
                                        <p className="font-bold text-gray-900 mb-20 uppercase text-[12px]">Đại diện Kiro Việt Nam</p>
                                        <p className="font-bold text-sunbot-600 uppercase tracking-wide text-[14px]">{quoterName}</p>
                                        <p className="text-[11px] text-gray-500 mt-0.5">Chuyên viên Tư vấn Phụ trách</p>
                                    </div>
                                </div>
                                
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
